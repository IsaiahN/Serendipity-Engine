<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serendipity | StoryWeaver</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <img src="favicon.svg" alt="Serendipity" class="popup-logo" />
      <div class="popup-title">
        <span class="popup-name">Serendipity</span>
        <span class="popup-subtitle">StoryWeaver</span>
      </div>
    </div>
    <button id="open-app" class="popup-btn primary">Open StoryWeaver</button>
    <div class="popup-links">
      <button id="open-hub" class="popup-btn secondary">My Stories</button>
      <button id="open-wizard" class="popup-btn secondary">New Story</button>
    </div>
    <div class="popup-footer">
      <span class="popup-version"></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
