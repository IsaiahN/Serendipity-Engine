      <stop offset="0%" stop-color="#ffd699" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0a050" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a050"/>
