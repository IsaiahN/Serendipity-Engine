  <path d="M60 30 C60.75 46.5 73.5 59.25 90 60 C73.5 60.75 60.75 73.5 60 90 C59.25 73.5 46.5 60.75 30 60 C46.5 59.25 59.25 46.5 60 30Z" fill="#ffd699" opacity="0.5"/>
